apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: hello-world-api-go
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/solthoth/hello-world-api.go.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hello-world-api-go
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./deploy/overlays/kind
  prune: true
  sourceRef:
    kind: GitRepository
    name: hello-world-api-go