apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-managed-cluster
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/solthoth/flux-managed-cluster.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: argocd
  namespace: flux-system
spec:
  interval: 5m
  path: ./clusters/kind/argocd
  prune: true
  sourceRef:
    kind: GitRepository
    name: argocd