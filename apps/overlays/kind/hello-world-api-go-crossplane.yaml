---
# Applies the Crossplane StorageQueue claim from the hello-world-api-go app repo.
# Depends on hello-world-api-go so ArgoCD has deployed the app (and created its namespace)
# before the claim is applied. The connection secret (hello-world-api-queue-conn) will be
# written to app-solthoth-hello-world-api-go once Azure provisioning completes.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hello-world-api-go-crossplane
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./deploy/crossplane/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: hello-world-api-go
  dependsOn:
    - name: crossplane-compositions
    - name: hello-world-api-go
