---
# Applies the Crossplane StorageQueue claim from the hello-world-api-go app repo.
# The connection secret (hello-world-api-queue-conn) will be written to hello-world-api-go
# once Azure provisioning completes.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hello-world-api-go-crossplane
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./deploy/crossplane/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: hello-world-api-go
  dependsOn:
    - name: crossplane-compositions
    - name: hello-world-api-go
