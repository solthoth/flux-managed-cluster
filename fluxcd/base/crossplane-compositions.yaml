---
# Applies the XRD and Composition — cluster-scoped, shared across all environments.
# Path does not use TENANT because compositions are env-agnostic.
# Overlay patches only change sourceRef.name.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-compositions
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./crossplane/compositions
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-managed-cluster
  dependsOn:
    - name: crossplane-config
  wait: true
  timeout: 5m
