---
# Applies environment-specific XRC Claims.
# Depends on crossplane-compositions so the XRD and Composition are registered
# before Claims attempt to bind to them.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-claims
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./crossplane/overlays/TENANT/claims
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-managed-cluster
  dependsOn:
    - name: crossplane-compositions
  wait: true
  timeout: 10m
